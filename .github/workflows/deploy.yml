name: Deploy Packages

on:
  push:
    branches: [user_site]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: "hosting-packages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: ./user_site
        run: flutter pub get

      - name: Build Flutter web
        working-directory: ./user_site
        run: flutter build web --base-href=/

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/1042076784714/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: github-actions@rubydog-sites.iam.gserviceaccount.com

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting:packages --project=rubydog-sites --non-interactive
